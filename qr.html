<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-QR Detector with AI</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --accent: #00ffb4;
            --accent-dim: #00cc90;
            --accent-orange: #ff9f43;
            --accent-purple: #9d65ff;
            --text: #e8e8e8;
            --text-dim: #888;
            --warning: #ff6b6b;
            --border: #2a2a3a;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .ai-badge {
            display: inline-block;
            background: var(--accent-purple);
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
        
        /* Setup Screen */
        .setup-screen {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .setup-title {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-hint {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .setup-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 2px solid var(--border);
        }
        video {
            width: 100%;
            display: block;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .stats-panel {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            margin-top: 10px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
        .stat { text-align: center; }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            transition: all 0.2s;
        }
        .stat-value.zero { color: var(--text-dim); }
        .stat-value.active {
            color: var(--accent-orange);
            animation: pulse 0.4s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .stat-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        /* Category Summary */
        .category-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            margin-top: 10px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
        .category-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .category-tag .count {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.6rem;
        }
        
        .results {
            flex: 1;
            margin-top: 10px;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            max-height: 30vh;
            overflow-y: auto;
        }
        .results-header {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .qr-list { display: flex; flex-direction: column; gap: 8px; }
        .qr-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            animation: slideIn 0.2s ease-out;
            transition: all 0.15s;
        }
        .qr-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 180, 0.25);
            background: rgba(0, 255, 180, 0.05);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .qr-badge {
            background: var(--accent);
            color: var(--bg-dark);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 15px;
        }
        .qr-category {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 15px;
        }
        .qr-category.analyzing {
            background: var(--border);
            color: var(--text-dim);
            animation: pulse 1s infinite;
        }
        .qr-time { font-size: 0.6rem; color: var(--text-dim); }
        .qr-data {
            font-size: 0.75rem;
            word-break: break-all;
            color: var(--text);
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 6px;
            max-height: 40px;
            overflow-y: auto;
        }
        .qr-actions { display: flex; gap: 6px; margin-top: 8px; }
        .btn {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: var(--bg-dark); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .empty-state {
            text-align: center;
            padding: 25px 15px;
            color: var(--text-dim);
        }
        .empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }
        .empty-text { font-size: 0.75rem; line-height: 1.5; }
        .error-banner {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin: 10px auto;
            max-width: 640px;
            font-size: 0.75rem;
        }
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg-dark);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.7rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⬡ QR Detector <span class="ai-badge">AI</span></h1>
            <p class="subtitle">Auto-categorizes QR codes with AI</p>
        </header>

        <!-- Setup Screen -->
        <div id="setupScreen" class="setup-screen">
            <div class="setup-title">🔑 Enter OpenRouter API Key</div>
            
            <div class="form-group">
                <label class="form-label">API Key</label>
                <input type="password" id="apiKeyInput" class="form-input" placeholder="sk-or-v1-...">
                <div class="form-hint">Get your key at <a href="https://openrouter.ai/keys" target="_blank" style="color: var(--accent);">openrouter.ai/keys</a></div>
            </div>
            
            <div class="form-group">
                <label class="form-label">AI Model (Optional)</label>
                <select id="modelSelect" class="form-input">
                    <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Free)</option>
                    <option value="google/gemma-2-9b-it:free">Gemma 2 9B (Free)</option>
                    <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Free)</option>
                    <option value="openai/gpt-4o-mini">GPT-4o Mini (Paid)</option>
                    <option value="anthropic/claude-3-haiku">Claude 3 Haiku (Paid)</option>
                </select>
            </div>
            
            <button id="startBtn" class="setup-btn">Start Scanning →</button>
        </div>

        <div id="errorBanner" class="error-banner hidden"></div>

        <div id="videoSection" class="hidden">
            <div class="video-container">
                <video id="video" playsinline muted></video>
                <svg id="overlay"></svg>
            </div>

            <div class="stats-panel">
                <div class="stat">
                    <div id="qrCount" class="stat-value zero">0</div>
                    <div class="stat-label">On Screen</div>
                </div>
                <div class="stat">
                    <div id="fps" class="stat-value zero">0</div>
                    <div class="stat-label">Scans/s</div>
                </div>
                <div class="stat">
                    <div id="totalScanned" class="stat-value zero">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
            
            <div id="categorySummary" class="category-summary hidden"></div>

            <div class="results">
                <div class="results-header">
                    <div class="live-dot"></div>
                    Detected QR Codes
                </div>
                <div id="qrList" class="qr-list">
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <div class="empty-text">Point camera at QR codes<br>AI will categorize them automatically</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- jsQR library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const setupScreen = document.getElementById('setupScreen');
        const videoSection = document.getElementById('videoSection');
        const errorBanner = document.getElementById('errorBanner');
        const qrCountEl = document.getElementById('qrCount');
        const fpsEl = document.getElementById('fps');
        const totalScannedEl = document.getElementById('totalScanned');
        const qrListEl = document.getElementById('qrList');
        const categorySummary = document.getElementById('categorySummary');
        const toast = document.getElementById('toast');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const modelSelect = document.getElementById('modelSelect');

        let scanning = false;
        let scanCount = 0;
        let lastTime = performance.now();
        let totalScanned = 0;
        let detectedQRs = new Map();
        let activeQRs = new Map();
        let canvas, ctx;
        let apiKey = '';
        let aiModel = '';
        let categoryColors = {};
        let categoryCounts = {};

        // Category color palette
        const colorPalette = [
            { bg: '#ff6b6b', text: '#fff' },  // Red - Food & Beverage
            { bg: '#4ecdc4', text: '#000' },  // Teal - Technology
            { bg: '#45b7d1', text: '#000' },  // Blue - Social Media
            { bg: '#96ceb4', text: '#000' },  // Green - Shopping
            { bg: '#ffeaa7', text: '#000' },  // Yellow - Entertainment
            { bg: '#dfe6e9', text: '#000' },  // Gray - Other
            { bg: '#a29bfe', text: '#000' },  // Purple - Education
            { bg: '#fd79a8', text: '#000' },  // Pink - Health
            { bg: '#ffeaa7', text: '#000' },  // Yellow - Finance
            { bg: '#74b9ff', text: '#000' },  // Light Blue - Travel
        ];
        let colorIndex = 0;

        function getColorForCategory(category) {
            if (!categoryColors[category]) {
                categoryColors[category] = colorPalette[colorIndex % colorPalette.length];
                colorIndex++;
            }
            return categoryColors[category];
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.remove('hidden');
        }

        // Call OpenRouter API to categorize QR content
        async function categorizeWithAI(qrData) {
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'QR Code Detector'
                    },
                    body: JSON.stringify({
                        model: aiModel,
                        messages: [{
                            role: 'user',
                            content: `Categorize this QR code content into ONE category. Reply with ONLY the category name, nothing else.

Categories to choose from:
- Food & Beverage (restaurants, cafes, food delivery, drinks)
- Technology (IT, electronics, software, hardware, tech companies)
- Shopping (retail, e-commerce, products, stores)
- Social Media (social networks, messaging, content platforms)
- Entertainment (movies, music, games, streaming)
- Finance (banking, payments, crypto, investments)
- Travel (airlines, hotels, tourism, transportation)
- Education (schools, courses, learning, tutorials)
- Health (medical, fitness, wellness, pharmacy)
- News & Media (news sites, blogs, magazines)
- Business (corporate, B2B, professional services)
- Government (official, public services)
- Other (if none of the above fit)

QR Content: ${qrData}

Reply with ONLY the category name:`
                        }],
                        max_tokens: 20,
                        temperature: 0.1
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                let category = data.choices[0].message.content.trim();
                
                // Clean up the category
                category = category.replace(/[*"']/g, '').trim();
                if (category.length > 25) {
                    category = category.substring(0, 25);
                }
                
                return category || 'Other';
            } catch (error) {
                console.error('AI categorization error:', error);
                return 'Unknown';
            }
        }

        async function startCamera() {
            apiKey = apiKeyInput.value.trim();
            aiModel = modelSelect.value;
            
            if (!apiKey) {
                showToast('Please enter your API key');
                apiKeyInput.focus();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                video.srcObject = stream;
                await video.play();

                setupScreen.classList.add('hidden');
                videoSection.classList.remove('hidden');

                canvas = document.createElement('canvas');
                ctx = canvas.getContext('2d', { willReadFrequently: true });

                await new Promise(resolve => {
                    if (video.videoWidth > 0) resolve();
                    else video.onloadedmetadata = resolve;
                });

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                overlay.setAttribute('viewBox', `0 0 ${video.videoWidth} ${video.videoHeight}`);

                scanning = true;
                scanLoop();

            } catch (err) {
                console.error('Camera error:', err);
                showError(`Camera access denied or not available. Error: ${err.message}`);
            }
        }

        function detectMultipleQRCodes() {
            ctx.drawImage(video, 0, 0);
            const fullImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const results = new Map();
            const w = canvas.width;
            const h = canvas.height;

            // Full frame scan
            const fullResult = jsQR(fullImageData.data, w, h, { inversionAttempts: 'dontInvert' });
            if (fullResult && fullResult.data) {
                results.set(fullResult.data, fullResult);
            }

            // Grid scan (3x3 with overlap)
            const gridSize = 3;
            const overlap = 0.3;
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const regionW = Math.floor(w / (gridSize - overlap));
                    const regionH = Math.floor(h / (gridSize - overlap));
                    const startX = Math.floor(col * (w - regionW) / (gridSize - 1));
                    const startY = Math.floor(row * (h - regionH) / (gridSize - 1));
                    
                    const actualW = Math.min(regionW, w - startX);
                    const actualH = Math.min(regionH, h - startY);
                    
                    if (actualW > 100 && actualH > 100) {
                        const regionData = ctx.getImageData(startX, startY, actualW, actualH);
                        const result = jsQR(regionData.data, actualW, actualH, { inversionAttempts: 'dontInvert' });
                        
                        if (result && result.data && !results.has(result.data)) {
                            result.location.topLeftCorner.x += startX;
                            result.location.topLeftCorner.y += startY;
                            result.location.topRightCorner.x += startX;
                            result.location.topRightCorner.y += startY;
                            result.location.bottomLeftCorner.x += startX;
                            result.location.bottomLeftCorner.y += startY;
                            result.location.bottomRightCorner.x += startX;
                            result.location.bottomRightCorner.y += startY;
                            results.set(result.data, result);
                        }
                    }
                }
            }

            // Quadrant scanning
            const quadrants = [
                { x: 0, y: 0, w: w * 0.55, h: h * 0.55 },
                { x: w * 0.45, y: 0, w: w * 0.55, h: h * 0.55 },
                { x: 0, y: h * 0.45, w: w * 0.55, h: h * 0.55 },
                { x: w * 0.45, y: h * 0.45, w: w * 0.55, h: h * 0.55 },
                { x: w * 0.2, y: h * 0.2, w: w * 0.6, h: h * 0.6 },
            ];

            quadrants.forEach(q => {
                const sx = Math.floor(q.x);
                const sy = Math.floor(q.y);
                const sw = Math.floor(Math.min(q.w, w - sx));
                const sh = Math.floor(Math.min(q.h, h - sy));
                
                if (sw > 50 && sh > 50) {
                    const regionData = ctx.getImageData(sx, sy, sw, sh);
                    const result = jsQR(regionData.data, sw, sh, { inversionAttempts: 'dontInvert' });
                    
                    if (result && result.data && !results.has(result.data)) {
                        result.location.topLeftCorner.x += sx;
                        result.location.topLeftCorner.y += sy;
                        result.location.topRightCorner.x += sx;
                        result.location.topRightCorner.y += sy;
                        result.location.bottomLeftCorner.x += sx;
                        result.location.bottomLeftCorner.y += sy;
                        result.location.bottomRightCorner.x += sx;
                        result.location.bottomRightCorner.y += sy;
                        results.set(result.data, result);
                    }
                }
            });

            return Array.from(results.values());
        }

        function scanLoop() {
            if (!scanning) return;

            scanCount++;
            const now = performance.now();
            if (now - lastTime >= 500) {
                const sps = Math.round(scanCount / ((now - lastTime) / 1000));
                fpsEl.textContent = sps;
                fpsEl.classList.toggle('zero', sps === 0);
                scanCount = 0;
                lastTime = now;
            }

            const results = detectMultipleQRCodes();
            const currentActive = new Map();
            
            overlay.innerHTML = '';
            
            let idx = 1;
            results.forEach(result => {
                if (result && result.data) {
                    currentActive.set(result.data, result.location);
                    processQR(result.data);
                    drawOverlay(result.location, idx++, result.data);
                }
            });

            activeQRs = currentActive;
            updateStats(currentActive.size);
            updateListStates();

            requestAnimationFrame(scanLoop);
        }

        async function processQR(data) {
            if (!detectedQRs.has(data)) {
                totalScanned++;
                totalScannedEl.textContent = totalScanned;
                totalScannedEl.classList.remove('zero');
                
                const qrEntry = {
                    data,
                    timestamp: new Date().toLocaleTimeString(),
                    index: detectedQRs.size + 1,
                    category: null,
                    analyzing: true
                };
                
                detectedQRs.set(data, qrEntry);
                updateQRList();
                showToast(`QR #${qrEntry.index} found! Analyzing...`);
                
                // Categorize with AI
                const category = await categorizeWithAI(data);
                qrEntry.category = category;
                qrEntry.analyzing = false;
                
                // Update category counts
                categoryCounts[category] = (categoryCounts[category] || 0) + 1;
                
                updateQRList();
                updateCategorySummary();
                showToast(`QR #${qrEntry.index}: ${category}`);
            }
        }

        function updateCategorySummary() {
            if (Object.keys(categoryCounts).length === 0) {
                categorySummary.classList.add('hidden');
                return;
            }
            
            categorySummary.classList.remove('hidden');
            categorySummary.innerHTML = '';
            
            Object.entries(categoryCounts)
                .sort((a, b) => b[1] - a[1])
                .forEach(([category, count]) => {
                    const color = getColorForCategory(category);
                    const tag = document.createElement('div');
                    tag.className = 'category-tag';
                    tag.style.background = color.bg;
                    tag.style.color = color.text;
                    tag.innerHTML = `${category} <span class="count">${count}</span>`;
                    categorySummary.appendChild(tag);
                });
        }

        function drawOverlay(loc, index, data) {
            const ns = 'http://www.w3.org/2000/svg';
            const qr = detectedQRs.get(data);
            
            let color = '#00ffb4';
            if (qr && qr.category) {
                const catColor = getColorForCategory(qr.category);
                color = catColor.bg;
            }
            
            const poly = document.createElementNS(ns, 'polygon');
            poly.setAttribute('points', 
                `${loc.topLeftCorner.x},${loc.topLeftCorner.y} ` +
                `${loc.topRightCorner.x},${loc.topRightCorner.y} ` +
                `${loc.bottomRightCorner.x},${loc.bottomRightCorner.y} ` +
                `${loc.bottomLeftCorner.x},${loc.bottomLeftCorner.y}`
            );
            poly.style.fill = `${color}40`;
            poly.setAttribute('stroke', color);
            poly.setAttribute('stroke-width', '4');
            overlay.appendChild(poly);

            [loc.topLeftCorner, loc.topRightCorner, loc.bottomRightCorner, loc.bottomLeftCorner].forEach(corner => {
                const circle = document.createElementNS(ns, 'circle');
                circle.setAttribute('cx', corner.x);
                circle.setAttribute('cy', corner.y);
                circle.setAttribute('r', '8');
                circle.setAttribute('fill', color);
                circle.setAttribute('stroke', '#000');
                circle.setAttribute('stroke-width', '2');
                overlay.appendChild(circle);
            });

            const labelY = Math.max(30, loc.topLeftCorner.y - 10);
            const labelText = qr && qr.category ? qr.category : `QR #${index}`;
            const labelWidth = Math.max(65, labelText.length * 8 + 16);
            
            const rect = document.createElementNS(ns, 'rect');
            rect.setAttribute('x', loc.topLeftCorner.x);
            rect.setAttribute('y', labelY - 26);
            rect.setAttribute('width', labelWidth);
            rect.setAttribute('height', '26');
            rect.setAttribute('rx', '5');
            rect.setAttribute('fill', color);
            overlay.appendChild(rect);

            const text = document.createElementNS(ns, 'text');
            text.setAttribute('x', loc.topLeftCorner.x + 8);
            text.setAttribute('y', labelY - 8);
            text.setAttribute('fill', '#000');
            text.setAttribute('font-size', '12');
            text.setAttribute('font-weight', 'bold');
            text.setAttribute('font-family', 'JetBrains Mono, monospace');
            text.textContent = labelText;
            overlay.appendChild(text);
        }

        function updateStats(count) {
            qrCountEl.textContent = count;
            qrCountEl.classList.toggle('zero', count === 0);
            qrCountEl.classList.toggle('active', count > 0);
        }

        function updateListStates() {
            document.querySelectorAll('.qr-item').forEach(item => {
                item.classList.toggle('active', activeQRs.has(item.dataset.qrData));
            });
        }

        function updateQRList() {
            if (detectedQRs.size === 0) {
                qrListEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📷</div><div class="empty-text">Point camera at QR codes<br>AI will categorize them</div></div>`;
                return;
            }

            qrListEl.innerHTML = '';
            Array.from(detectedQRs.values()).reverse().forEach(qr => {
                const item = document.createElement('div');
                item.className = 'qr-item' + (activeQRs.has(qr.data) ? ' active' : '');
                item.dataset.qrData = qr.data;
                
                const isUrl = qr.data.startsWith('http') || qr.data.startsWith('www.');
                const color = qr.category ? getColorForCategory(qr.category) : null;
                
                let categoryHtml = '';
                if (qr.analyzing) {
                    categoryHtml = `<span class="qr-category analyzing">Analyzing...</span>`;
                } else if (qr.category) {
                    categoryHtml = `<span class="qr-category" style="background: ${color.bg}; color: ${color.text}">${qr.category}</span>`;
                }
                
                item.innerHTML = `
                    <div class="qr-header">
                        <span class="qr-badge">QR #${qr.index}</span>
                        ${categoryHtml}
                        <span class="qr-time">${qr.timestamp}</span>
                    </div>
                    <div class="qr-data">${escapeHtml(qr.data)}</div>
                    <div class="qr-actions">
                        <button class="btn btn-primary" onclick="copyText('${escapeAttr(qr.data)}')">Copy</button>
                        ${isUrl ? `<button class="btn btn-secondary" onclick="openUrl('${escapeAttr(qr.data)}')">Open</button>` : ''}
                    </div>
                `;
                qrListEl.appendChild(item);
            });
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function escapeAttr(t) {
            return t.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        window.copyText = function(t) {
            navigator.clipboard.writeText(t).then(() => showToast('Copied!')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = t;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Copied!');
            });
        };

        window.openUrl = function(u) {
            window.open(u.startsWith('http') ? u : 'https://' + u, '_blank');
        };

        startBtn.addEventListener('click', startCamera);
    </script>
</body>
</html>
