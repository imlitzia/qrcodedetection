<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-QR Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --accent: #00ffb4;
            --accent-dim: #00cc90;
            --accent-orange: #ff9f43;
            --text: #e8e8e8;
            --text-dim: #888;
            --warning: #ff6b6b;
            --border: #2a2a3a;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 4px;
        }
        
        /* API Key Section */
        .api-section {
            max-width: 640px;
            margin: 0 auto 15px;
            width: 100%;
        }
        .api-input-group {
            display: flex;
            gap: 8px;
        }
        .api-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }
        .api-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .api-btn {
            padding: 10px 16px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .api-status {
            font-size: 0.7rem;
            margin-top: 6px;
            color: var(--text-dim);
        }
        .api-status.connected { color: var(--accent); }
        .api-status.error { color: var(--warning); }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 2px solid var(--border);
        }
        video {
            width: 100%;
            display: block;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .stats-panel {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            margin-top: 12px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
        .stat { text-align: center; }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            transition: all 0.2s;
        }
        .stat-value.zero { color: var(--text-dim); }
        .stat-value.active {
            color: var(--accent-orange);
            animation: pulse 0.4s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .stat-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .results {
            flex: 1;
            margin-top: 12px;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
        }
        .results-header {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .qr-list { display: flex; flex-direction: column; gap: 8px; }
        .qr-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            animation: slideIn 0.2s ease-out;
            transition: all 0.15s;
        }
        .qr-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 180, 0.25);
            background: rgba(0, 255, 180, 0.05);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .qr-badge {
            background: var(--accent);
            color: var(--bg-dark);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 15px;
        }
        .qr-time { font-size: 0.65rem; color: var(--text-dim); }
        
        /* Category Badge */
        .category-badge {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .category-food { background: #ff6b6b; color: #fff; }
        .category-technology { background: #4dabf7; color: #fff; }
        .category-shopping { background: #ff9f43; color: #fff; }
        .category-social { background: #a855f7; color: #fff; }
        .category-finance { background: #22c55e; color: #fff; }
        .category-entertainment { background: #ec4899; color: #fff; }
        .category-travel { background: #06b6d4; color: #fff; }
        .category-education { background: #8b5cf6; color: #fff; }
        .category-health { background: #10b981; color: #fff; }
        .category-news { background: #6366f1; color: #fff; }
        .category-other { background: #64748b; color: #fff; }
        .category-loading { 
            background: var(--border); 
            color: var(--text-dim);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .qr-data {
            font-size: 0.8rem;
            word-break: break-all;
            color: var(--text);
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
            max-height: 50px;
            overflow-y: auto;
        }
        .qr-actions { display: flex; gap: 6px; margin-top: 10px; }
        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: var(--bg-dark); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .empty-state {
            text-align: center;
            padding: 30px 15px;
            color: var(--text-dim);
        }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
        .empty-text { font-size: 0.8rem; line-height: 1.5; }
        .error-banner {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin: 12px auto;
            max-width: 640px;
            font-size: 0.8rem;
        }
        .start-btn {
            display: block;
            width: 100%;
            max-width: 640px;
            margin: 15px auto;
            padding: 16px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg-dark);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⬡ Smart QR Detector</h1>
            <p class="subtitle">AI-powered QR categorization</p>
        </header>

        <!-- API Key Input -->
        <div class="api-section">
            <div class="api-input-group">
                <input type="password" id="apiKey" class="api-input" placeholder="Enter OpenRouter API Key">
                <button id="saveApiBtn" class="api-btn">Save</button>
            </div>
            <div id="apiStatus" class="api-status">Enter your OpenRouter API key to enable AI categorization</div>
        </div>

        <button id="startBtn" class="start-btn">Start Camera</button>
        <div id="errorBanner" class="error-banner hidden"></div>

        <div id="videoSection" class="hidden">
            <div class="video-container">
                <video id="video" playsinline muted></video>
                <svg id="overlay"></svg>
            </div>

            <div class="stats-panel">
                <div class="stat">
                    <div id="qrCount" class="stat-value zero">0</div>
                    <div class="stat-label">On Screen</div>
                </div>
                <div class="stat">
                    <div id="fps" class="stat-value zero">0</div>
                    <div class="stat-label">Scans/s</div>
                </div>
                <div class="stat">
                    <div id="totalScanned" class="stat-value zero">0</div>
                    <div class="stat-label">Total Found</div>
                </div>
            </div>

            <div class="results">
                <div class="results-header">
                    <div class="live-dot"></div>
                    Detected QR Codes
                </div>
                <div id="qrList" class="qr-list">
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <div class="empty-text">Point camera at QR codes</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- jsQR library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const videoSection = document.getElementById('videoSection');
        const errorBanner = document.getElementById('errorBanner');
        const qrCountEl = document.getElementById('qrCount');
        const fpsEl = document.getElementById('fps');
        const totalScannedEl = document.getElementById('totalScanned');
        const qrListEl = document.getElementById('qrList');
        const toast = document.getElementById('toast');
        const apiKeyInput = document.getElementById('apiKey');
        const saveApiBtn = document.getElementById('saveApiBtn');
        const apiStatus = document.getElementById('apiStatus');

        let scanning = false;
        let scanCount = 0;
        let lastTime = performance.now();
        let totalScanned = 0;
        let detectedQRs = new Map();
        let activeQRs = new Map();
        let canvas, ctx;
        let regionCanvas, regionCtx;
        let openRouterApiKey = localStorage.getItem('openRouterApiKey') || '';

        // Category definitions
        const CATEGORIES = {
            'food': { name: 'Food & Beverage', class: 'category-food', icon: '🍔' },
            'technology': { name: 'Technology', class: 'category-technology', icon: '💻' },
            'shopping': { name: 'Shopping', class: 'category-shopping', icon: '🛒' },
            'social': { name: 'Social Media', class: 'category-social', icon: '📱' },
            'finance': { name: 'Finance', class: 'category-finance', icon: '💰' },
            'entertainment': { name: 'Entertainment', class: 'category-entertainment', icon: '🎬' },
            'travel': { name: 'Travel', class: 'category-travel', icon: '✈️' },
            'education': { name: 'Education', class: 'category-education', icon: '📚' },
            'health': { name: 'Health', class: 'category-health', icon: '🏥' },
            'news': { name: 'News & Media', class: 'category-news', icon: '📰' },
            'other': { name: 'Other', class: 'category-other', icon: '📎' }
        };

        // Initialize API key from localStorage
        if (openRouterApiKey) {
            apiKeyInput.value = openRouterApiKey;
            apiStatus.textContent = '✓ API key saved';
            apiStatus.className = 'api-status connected';
        }

        // Save API key
        saveApiBtn.addEventListener('click', () => {
            openRouterApiKey = apiKeyInput.value.trim();
            if (openRouterApiKey) {
                localStorage.setItem('openRouterApiKey', openRouterApiKey);
                apiStatus.textContent = '✓ API key saved';
                apiStatus.className = 'api-status connected';
                showToast('API key saved!');
            } else {
                localStorage.removeItem('openRouterApiKey');
                apiStatus.textContent = 'Enter your OpenRouter API key';
                apiStatus.className = 'api-status';
            }
        });

        // Quick local categorization based on known domains
        function quickCategorize(qrData) {
            const data = qrData.toLowerCase();
            
            // Food & Beverage
            if (/starbucks|mcdonald|burger|pizza|domino|kfc|subway|dunkin|chipotle|wendys|taco|coffee|restaurant|food|eat|ubereats|doordash|grubhub/i.test(data)) {
                return 'food';
            }
            // Technology
            if (/lenovo|apple\.com|microsoft|samsung|dell|hp\.com|intel|nvidia|amd\.com|cisco|ibm\.com|oracle|adobe|github|stackoverflow/i.test(data)) {
                return 'technology';
            }
            // Shopping
            if (/amazon|ebay|walmart|alibaba|shopify|etsy|target\.com|bestbuy|costco|ikea/i.test(data)) {
                return 'shopping';
            }
            // Social Media
            if (/facebook|instagram|twitter|linkedin|tiktok|snapchat|pinterest|reddit|discord|whatsapp|telegram/i.test(data)) {
                return 'social';
            }
            // Finance
            if (/paypal|visa\.com|mastercard|chase|bank|citibank|wellsfargo|coinbase|crypto|bitcoin|venmo|stripe/i.test(data)) {
                return 'finance';
            }
            // Entertainment
            if (/netflix|spotify|youtube|twitch|hulu|disney|hbo|primevideo|soundcloud|gaming|steam|playstation|xbox/i.test(data)) {
                return 'entertainment';
            }
            // Travel
            if (/airbnb|booking\.com|expedia|tripadvisor|airline|united\.com|delta\.com|hotel|marriott|hilton|kayak/i.test(data)) {
                return 'travel';
            }
            // Education
            if (/coursera|udemy|edx|khanacademy|university|\.edu|school|learn|tutorial|academic/i.test(data)) {
                return 'education';
            }
            // Health
            if (/cvs|walgreens|pharmacy|hospital|clinic|health|medical|doctor|webmd|mayoclinic|fitness|gym/i.test(data)) {
                return 'health';
            }
            // News
            if (/cnn|bbc|nytimes|reuters|news|foxnews|washingtonpost|guardian|huffpost|npr\.org/i.test(data)) {
                return 'news';
            }
            
            return null; // Unknown - will use LLM
        }

        // Categorize QR code using LLM
        async function categorizeWithLLM(qrData, qrIndex) {
            // First try quick local categorization
            const quickResult = quickCategorize(qrData);
            if (quickResult) {
                const catInfo = CATEGORIES[quickResult];
                showToast(`QR #${qrIndex}: ${catInfo.icon} ${catInfo.name}`);
                console.log(`[QR #${qrIndex}] Quick categorized as: ${quickResult}`);
                return quickResult;
            }
            
            // If no API key, return other
            if (!openRouterApiKey) {
                showToast('No API key - showing as Other');
                return 'other';
            }

            try {
                console.log(`[QR #${qrIndex}] Sending to LLM: ${qrData.substring(0, 50)}...`);
                
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openRouterApiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'QR Code Detector'
                    },
                    body: JSON.stringify({
                        model: 'meta-llama/llama-3.2-3b-instruct:free',
                        messages: [
                            {
                                role: 'system',
                                content: `Categorize the URL/text into exactly ONE category. Reply with ONLY the category word:
food, technology, shopping, social, finance, entertainment, travel, education, health, news, other

Examples:
- starbucks.com → food
- lenovo.com → technology
- amazon.com → shopping
- facebook.com → social
- paypal.com → finance
- netflix.com → entertainment
- airbnb.com → travel
- coursera.org → education
- cvs.com → health
- cnn.com → news

Reply with just ONE word from: food, technology, shopping, social, finance, entertainment, travel, education, health, news, other`
                            },
                            {
                                role: 'user',
                                content: qrData
                            }
                        ],
                        max_tokens: 10,
                        temperature: 0
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('LLM API error:', response.status, errorText);
                    showToast(`API Error: ${response.status}`);
                    return 'other';
                }

                const data = await response.json();
                console.log(`[QR #${qrIndex}] LLM response:`, data);
                
                let category = data.choices[0]?.message?.content?.trim().toLowerCase() || 'other';
                
                // Clean up response - extract just the category word
                category = category.replace(/[^a-z]/g, '');
                
                // Validate category
                if (CATEGORIES[category]) {
                    const catInfo = CATEGORIES[category];
                    showToast(`QR #${qrIndex}: ${catInfo.icon} ${catInfo.name}`);
                    return category;
                }
                
                console.log(`[QR #${qrIndex}] Unknown category: ${category}, defaulting to other`);
                showToast(`QR #${qrIndex}: 📎 Other`);
                return 'other';
            } catch (error) {
                console.error('LLM categorization error:', error);
                showToast(`Error: ${error.message}`);
                return 'other';
            }
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.remove('hidden');
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                video.srcObject = stream;
                await video.play();

                startBtn.classList.add('hidden');
                videoSection.classList.remove('hidden');

                canvas = document.createElement('canvas');
                ctx = canvas.getContext('2d', { willReadFrequently: true });
                
                regionCanvas = document.createElement('canvas');
                regionCtx = regionCanvas.getContext('2d', { willReadFrequently: true });

                await new Promise(resolve => {
                    if (video.videoWidth > 0) resolve();
                    else video.onloadedmetadata = resolve;
                });

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                overlay.setAttribute('viewBox', `0 0 ${video.videoWidth} ${video.videoHeight}`);

                scanning = true;
                scanLoop();

            } catch (err) {
                console.error('Camera error:', err);
                showError(`Camera access denied or not available. Error: ${err.message}`);
            }
        }

        function detectMultipleQRCodes() {
            ctx.drawImage(video, 0, 0);
            const fullImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const results = new Map();
            const w = canvas.width;
            const h = canvas.height;

            const fullResult = jsQR(fullImageData.data, w, h, { inversionAttempts: 'dontInvert' });
            if (fullResult && fullResult.data) {
                results.set(fullResult.data, fullResult);
            }

            const gridSize = 3;
            const overlap = 0.3;
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const regionW = Math.floor(w / (gridSize - overlap));
                    const regionH = Math.floor(h / (gridSize - overlap));
                    const startX = Math.floor(col * (w - regionW) / (gridSize - 1));
                    const startY = Math.floor(row * (h - regionH) / (gridSize - 1));
                    
                    const actualW = Math.min(regionW, w - startX);
                    const actualH = Math.min(regionH, h - startY);
                    
                    if (actualW > 100 && actualH > 100) {
                        const regionData = ctx.getImageData(startX, startY, actualW, actualH);
                        const result = jsQR(regionData.data, actualW, actualH, { inversionAttempts: 'dontInvert' });
                        
                        if (result && result.data && !results.has(result.data)) {
                            result.location.topLeftCorner.x += startX;
                            result.location.topLeftCorner.y += startY;
                            result.location.topRightCorner.x += startX;
                            result.location.topRightCorner.y += startY;
                            result.location.bottomLeftCorner.x += startX;
                            result.location.bottomLeftCorner.y += startY;
                            result.location.bottomRightCorner.x += startX;
                            result.location.bottomRightCorner.y += startY;
                            results.set(result.data, result);
                        }
                    }
                }
            }

            const quadrants = [
                { x: 0, y: 0, w: w * 0.55, h: h * 0.55 },
                { x: w * 0.45, y: 0, w: w * 0.55, h: h * 0.55 },
                { x: 0, y: h * 0.45, w: w * 0.55, h: h * 0.55 },
                { x: w * 0.45, y: h * 0.45, w: w * 0.55, h: h * 0.55 },
                { x: w * 0.2, y: h * 0.2, w: w * 0.6, h: h * 0.6 },
                { x: 0, y: h * 0.25, w: w, h: h * 0.5 },
                { x: w * 0.25, y: 0, w: w * 0.5, h: h },
            ];

            quadrants.forEach(q => {
                const sx = Math.floor(q.x);
                const sy = Math.floor(q.y);
                const sw = Math.floor(Math.min(q.w, w - sx));
                const sh = Math.floor(Math.min(q.h, h - sy));
                
                if (sw > 50 && sh > 50) {
                    const regionData = ctx.getImageData(sx, sy, sw, sh);
                    const result = jsQR(regionData.data, sw, sh, { inversionAttempts: 'dontInvert' });
                    
                    if (result && result.data && !results.has(result.data)) {
                        result.location.topLeftCorner.x += sx;
                        result.location.topLeftCorner.y += sy;
                        result.location.topRightCorner.x += sx;
                        result.location.topRightCorner.y += sy;
                        result.location.bottomLeftCorner.x += sx;
                        result.location.bottomLeftCorner.y += sy;
                        result.location.bottomRightCorner.x += sx;
                        result.location.bottomRightCorner.y += sy;
                        results.set(result.data, result);
                    }
                }
            });

            if (results.size < 3) {
                const enhanced = enhanceContrast(fullImageData);
                const enhancedResult = jsQR(enhanced.data, w, h, { inversionAttempts: 'attemptBoth' });
                if (enhancedResult && enhancedResult.data && !results.has(enhancedResult.data)) {
                    results.set(enhancedResult.data, enhancedResult);
                }
            }

            return Array.from(results.values());
        }

        function enhanceContrast(imageData) {
            const data = new Uint8ClampedArray(imageData.data);
            
            let min = 255, max = 0;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i + 1] + data[i + 2]) / 3;
                if (gray < min) min = gray;
                if (gray > max) max = gray;
            }
            
            const range = max - min || 1;
            
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const stretched = ((gray - min) / range) * 255;
                data[i] = data[i + 1] = data[i + 2] = stretched;
            }
            
            return { data, width: imageData.width, height: imageData.height };
        }

        function scanLoop() {
            if (!scanning) return;

            scanCount++;
            const now = performance.now();
            if (now - lastTime >= 500) {
                const sps = Math.round(scanCount / ((now - lastTime) / 1000));
                fpsEl.textContent = sps;
                fpsEl.classList.toggle('zero', sps === 0);
                scanCount = 0;
                lastTime = now;
            }

            const results = detectMultipleQRCodes();
            const currentActive = new Map();
            
            overlay.innerHTML = '';
            
            let idx = 1;
            results.forEach(result => {
                if (result && result.data) {
                    currentActive.set(result.data, result.location);
                    processQR(result.data);
                    drawOverlay(result.location, idx++);
                }
            });

            activeQRs = currentActive;
            updateStats(currentActive.size);
            updateListStates();

            requestAnimationFrame(scanLoop);
        }

        async function processQR(data) {
            if (!detectedQRs.has(data)) {
                totalScanned++;
                totalScannedEl.textContent = totalScanned;
                totalScannedEl.classList.remove('zero');
                
                // Add with loading category first
                detectedQRs.set(data, {
                    data,
                    timestamp: new Date().toLocaleTimeString(),
                    index: detectedQRs.size + 1,
                    category: 'loading'
                });
                
                updateQRList();
                showToast(`QR #${detectedQRs.size} found!`);
                
                // Categorize with LLM in background
                const category = await categorizeWithLLM(data, detectedQRs.size);
                
                // Update category
                const qrInfo = detectedQRs.get(data);
                if (qrInfo) {
                    qrInfo.category = category;
                    detectedQRs.set(data, qrInfo);
                    updateQRList();
                }
            }
        }

        function drawOverlay(loc, index) {
            const ns = 'http://www.w3.org/2000/svg';
            
            const colors = ['#00ffb4', '#ff9f43', '#ff6b9d', '#9d65ff', '#65d9ff', '#ffeb3b'];
            const color = colors[(index - 1) % colors.length];
            
            const poly = document.createElementNS(ns, 'polygon');
            poly.setAttribute('points', 
                `${loc.topLeftCorner.x},${loc.topLeftCorner.y} ` +
                `${loc.topRightCorner.x},${loc.topRightCorner.y} ` +
                `${loc.bottomRightCorner.x},${loc.bottomRightCorner.y} ` +
                `${loc.bottomLeftCorner.x},${loc.bottomLeftCorner.y}`
            );
            poly.style.fill = `${color}40`;
            poly.setAttribute('stroke', color);
            poly.setAttribute('stroke-width', '4');
            overlay.appendChild(poly);

            [loc.topLeftCorner, loc.topRightCorner, loc.bottomRightCorner, loc.bottomLeftCorner].forEach(corner => {
                const circle = document.createElementNS(ns, 'circle');
                circle.setAttribute('cx', corner.x);
                circle.setAttribute('cy', corner.y);
                circle.setAttribute('r', '8');
                circle.setAttribute('fill', color);
                circle.setAttribute('stroke', '#000');
                circle.setAttribute('stroke-width', '2');
                overlay.appendChild(circle);
            });

            const labelY = Math.max(30, loc.topLeftCorner.y - 10);
            const rect = document.createElementNS(ns, 'rect');
            rect.setAttribute('x', loc.topLeftCorner.x);
            rect.setAttribute('y', labelY - 26);
            rect.setAttribute('width', '65');
            rect.setAttribute('height', '26');
            rect.setAttribute('rx', '5');
            rect.setAttribute('fill', color);
            overlay.appendChild(rect);

            const text = document.createElementNS(ns, 'text');
            text.setAttribute('x', loc.topLeftCorner.x + 8);
            text.setAttribute('y', labelY - 8);
            text.setAttribute('fill', '#000');
            text.setAttribute('font-size', '14');
            text.setAttribute('font-weight', 'bold');
            text.setAttribute('font-family', 'JetBrains Mono, monospace');
            text.textContent = `QR #${index}`;
            overlay.appendChild(text);
        }

        function updateStats(count) {
            qrCountEl.textContent = count;
            qrCountEl.classList.toggle('zero', count === 0);
            qrCountEl.classList.toggle('active', count > 0);
        }

        function updateListStates() {
            document.querySelectorAll('.qr-item').forEach(item => {
                item.classList.toggle('active', activeQRs.has(item.dataset.qrData));
            });
        }

        function updateQRList() {
            if (detectedQRs.size === 0) {
                qrListEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📷</div><div class="empty-text">Point camera at QR codes</div></div>`;
                return;
            }

            qrListEl.innerHTML = '';
            Array.from(detectedQRs.values()).reverse().forEach(qr => {
                const item = document.createElement('div');
                item.className = 'qr-item' + (activeQRs.has(qr.data) ? ' active' : '');
                item.dataset.qrData = qr.data;
                
                const isUrl = qr.data.startsWith('http') || qr.data.startsWith('www.');
                const categoryInfo = CATEGORIES[qr.category] || CATEGORIES['other'];
                const categoryClass = qr.category === 'loading' ? 'category-loading' : categoryInfo.class;
                const categoryText = qr.category === 'loading' ? 'Analyzing...' : `${categoryInfo.icon} ${categoryInfo.name}`;
                
                item.innerHTML = `
                    <div class="qr-header">
                        <span class="qr-badge">QR #${qr.index}</span>
                        <span class="category-badge ${categoryClass}">${categoryText}</span>
                        <span class="qr-time">${qr.timestamp}</span>
                    </div>
                    <div class="qr-data">${escapeHtml(qr.data)}</div>
                    <div class="qr-actions">
                        <button class="btn btn-primary" onclick="copyText('${escapeAttr(qr.data)}')">Copy</button>
                        ${isUrl ? `<button class="btn btn-secondary" onclick="openUrl('${escapeAttr(qr.data)}')">Open</button>` : ''}
                    </div>
                `;
                qrListEl.appendChild(item);
            });
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function escapeAttr(t) {
            return t.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        window.copyText = function(t) {
            navigator.clipboard.writeText(t).then(() => showToast('Copied!')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = t;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Copied!');
            });
        };

        window.openUrl = function(u) {
            window.open(u.startsWith('http') ? u : 'https://' + u, '_blank');
        };

        startBtn.addEventListener('click', startCamera);
    </script>
</body>
</html>
