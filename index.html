<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --accent: #00ffb4;
            --accent-dim: #00cc90;
            --text: #e8e8e8;
            --text-dim: #888;
            --warning: #ff6b6b;
            --border: #2a2a3a;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 255, 180, 0.1);
        }

        video {
            width: 100%;
            display: block;
            background: #000;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #processingCanvas {
            display: none;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 20px var(--accent);
            animation: scan 2s ease-in-out infinite;
            opacity: 0.8;
        }

        @keyframes scan {
            0%, 100% { top: 15%; }
            50% { top: 85%; }
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: var(--accent);
            border-style: solid;
            border-width: 0;
        }

        .corner-tl { top: 10%; left: 10%; border-top-width: 3px; border-left-width: 3px; }
        .corner-tr { top: 10%; right: 10%; border-top-width: 3px; border-right-width: 3px; }
        .corner-bl { bottom: 10%; left: 10%; border-bottom-width: 3px; border-left-width: 3px; }
        .corner-br { bottom: 10%; right: 10%; border-bottom-width: 3px; border-right-width: 3px; }

        .stats-panel {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            margin-top: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-value.zero {
            color: var(--text-dim);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .results {
            flex: 1;
            margin-top: 20px;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .results-header {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .qr-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .qr-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            animation: slideIn 0.3s ease-out;
            transition: border-color 0.2s;
        }

        .qr-item:hover {
            border-color: var(--accent);
        }

        .qr-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 180, 0.15);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .qr-badge {
            background: var(--accent);
            color: var(--bg-dark);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .qr-time {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .qr-data {
            font-size: 0.85rem;
            word-break: break-all;
            color: var(--text);
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .qr-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            background: var(--accent-dim);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #3a3a4a;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .error-banner {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin: 20px auto;
            max-width: 640px;
            font-size: 0.85rem;
        }

        .start-btn {
            display: block;
            width: 100%;
            max-width: 640px;
            margin: 20px auto;
            padding: 16px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: var(--accent-dim);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 180, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (min-width: 768px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 2rem;
            }

            .stat-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⬡ QR Detector</h1>
            <p class="subtitle">Real-time multi-QR code detection</p>
        </header>

        <button id="startBtn" class="start-btn">Start Camera</button>
        
        <div id="errorBanner" class="error-banner hidden"></div>

        <div id="videoSection" class="hidden">
            <div class="video-container">
                <video id="video" playsinline></video>
                <canvas id="canvas"></canvas>
                <canvas id="processingCanvas"></canvas>
                <div class="scan-overlay">
                    <div class="scan-line"></div>
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat">
                    <div id="qrCount" class="stat-value zero">0</div>
                    <div class="stat-label">QR Codes</div>
                </div>
                <div class="stat">
                    <div id="fps" class="stat-value zero">0</div>
                    <div class="stat-label">FPS</div>
                </div>
                <div class="stat">
                    <div id="totalScanned" class="stat-value zero">0</div>
                    <div class="stat-label">Total Scanned</div>
                </div>
            </div>

            <div class="results">
                <div class="results-header">Detected QR Codes</div>
                <div id="qrList" class="qr-list">
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <div class="empty-text">
                            Point your camera at QR codes<br>
                            They will appear here
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const processingCanvas = document.getElementById('processingCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const procCtx = processingCanvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const videoSection = document.getElementById('videoSection');
        const errorBanner = document.getElementById('errorBanner');
        const qrCountEl = document.getElementById('qrCount');
        const fpsEl = document.getElementById('fps');
        const totalScannedEl = document.getElementById('totalScanned');
        const qrListEl = document.getElementById('qrList');
        const toast = document.getElementById('toast');

        let scanning = false;
        let frameCount = 0;
        let lastTime = performance.now();
        let totalScanned = 0;
        let detectedQRs = new Map();
        let activeQRs = [];  // Array to store all currently visible QR codes
        let cachedResults = [];
        let cacheTimeout = 0;
        let scanCounter = 0;  // Counter to skip frames for performance
        const SCAN_EVERY_N_FRAMES = 5;  // Only scan every 5th frame (for 60fps camera)

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showError(message) {
            errorBanner.textContent = message;
            errorBanner.classList.remove('hidden');
        }

        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280, min: 640 },
                        height: { ideal: 720, min: 480 },
                        frameRate: { ideal: 60, min: 30 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();

                startBtn.classList.add('hidden');
                videoSection.classList.remove('hidden');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                processingCanvas.width = video.videoWidth;
                processingCanvas.height = video.videoHeight;

                scanning = true;
                requestAnimationFrame(scanFrame);
            } catch (err) {
                console.error('Camera error:', err);
                showError(`Camera access denied or not available. Error: ${err.message}`);
            }
        }

        // Mask out a detected QR code region by filling it with gray
        function maskQRRegion(imageData, location, padding = 20) {
            const width = imageData.width;
            const data = imageData.data;
            
            // Get bounding box with padding
            const minX = Math.max(0, Math.floor(Math.min(
                location.topLeftCorner.x,
                location.bottomLeftCorner.x
            )) - padding);
            const maxX = Math.min(width, Math.ceil(Math.max(
                location.topRightCorner.x,
                location.bottomRightCorner.x
            )) + padding);
            const minY = Math.max(0, Math.floor(Math.min(
                location.topLeftCorner.y,
                location.topRightCorner.y
            )) - padding);
            const maxY = Math.min(imageData.height, Math.ceil(Math.max(
                location.bottomLeftCorner.y,
                location.bottomRightCorner.y
            )) + padding);
            
            // Fill the region with gray (neutral color that won't be detected as QR)
            for (let y = minY; y < maxY; y++) {
                for (let x = minX; x < maxX; x++) {
                    const idx = (y * width + x) * 4;
                    data[idx] = 128;     // R
                    data[idx + 1] = 128; // G
                    data[idx + 2] = 128; // B
                }
            }
        }

        // Check if two locations are significantly different (different QR codes)
        function isNewLocation(loc1, loc2, threshold = 50) {
            const center1X = (loc1.topLeftCorner.x + loc1.bottomRightCorner.x) / 2;
            const center1Y = (loc1.topLeftCorner.y + loc1.bottomRightCorner.y) / 2;
            const center2X = (loc2.topLeftCorner.x + loc2.bottomRightCorner.x) / 2;
            const center2Y = (loc2.topLeftCorner.y + loc2.bottomRightCorner.y) / 2;
            
            const distance = Math.sqrt(
                Math.pow(center1X - center2X, 2) + 
                Math.pow(center1Y - center2Y, 2)
            );
            
            return distance > threshold;
        }

        // Enhance image for better QR detection
        function enhanceImageData(imageData) {
            const data = imageData.data;
            const len = data.length;
            
            // Calculate histogram for adaptive enhancement
            let minVal = 255, maxVal = 0;
            for (let i = 0; i < len; i += 4) {
                const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                if (gray < minVal) minVal = gray;
                if (gray > maxVal) maxVal = gray;
            }
            
            // Apply contrast stretching and sharpening
            const range = maxVal - minVal || 1;
            for (let i = 0; i < len; i += 4) {
                // Convert to grayscale
                let gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                
                // Contrast stretch
                gray = ((gray - minVal) / range) * 255;
                
                // Increase contrast
                gray = ((gray - 128) * 1.3) + 128;
                gray = Math.max(0, Math.min(255, gray));
                
                data[i] = gray;
                data[i + 1] = gray;
                data[i + 2] = gray;
            }
            
            return imageData;
        }

        // Binarize image for QR detection
        function binarizeImageData(imageData) {
            const data = imageData.data;
            const len = data.length;
            
            // Calculate average brightness
            let sum = 0;
            for (let i = 0; i < len; i += 4) {
                sum += data[i];
            }
            const avg = sum / (len / 4);
            const threshold = avg * 0.85; // Slightly below average
            
            for (let i = 0; i < len; i += 4) {
                const val = data[i] > threshold ? 255 : 0;
                data[i] = val;
                data[i + 1] = val;
                data[i + 2] = val;
            }
            
            return imageData;
        }

        // Detect multiple QR codes by scanning and masking
        function detectMultipleQRCodes(originalImageData, width, height) {
            const results = [];
            const maxQRCodes = 20;
            
            // Create working copies
            let workingData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                width,
                height
            );
            
            // Pass 1: Scan original image
            for (let i = 0; i < maxQRCodes; i++) {
                const code = jsQR(workingData.data, width, height, {
                    inversionAttempts: 'attemptBoth'
                });
                
                if (code && code.data) {
                    const isNew = results.every(r => isNewLocation(r.location, code.location));
                    if (isNew) {
                        results.push({ data: code.data, location: code.location });
                    }
                    maskQRRegion(workingData, code.location, 30);
                } else {
                    break;
                }
            }
            
            // Pass 2: Try with enhanced contrast
            if (results.length < maxQRCodes) {
                let enhancedData = new ImageData(
                    new Uint8ClampedArray(originalImageData.data),
                    width,
                    height
                );
                enhanceImageData(enhancedData);
                
                for (let i = 0; i < 5; i++) {
                    const code = jsQR(enhancedData.data, width, height, {
                        inversionAttempts: 'attemptBoth'
                    });
                    
                    if (code && code.data) {
                        const isNew = results.every(r => isNewLocation(r.location, code.location));
                        if (isNew) {
                            results.push({ data: code.data, location: code.location });
                        }
                        maskQRRegion(enhancedData, code.location, 30);
                    } else {
                        break;
                    }
                }
            }
            
            // Pass 3: Try with binarization for difficult QR codes
            if (results.length < maxQRCodes) {
                let binaryData = new ImageData(
                    new Uint8ClampedArray(originalImageData.data),
                    width,
                    height
                );
                enhanceImageData(binaryData);
                binarizeImageData(binaryData);
                
                for (let i = 0; i < 5; i++) {
                    const code = jsQR(binaryData.data, width, height, {
                        inversionAttempts: 'attemptBoth'
                    });
                    
                    if (code && code.data) {
                        const isNew = results.every(r => isNewLocation(r.location, code.location));
                        if (isNew) {
                            results.push({ data: code.data, location: code.location });
                        }
                        maskQRRegion(binaryData, code.location, 30);
                    } else {
                        break;
                    }
                }
            }
            
            // Pass 4: Scan quadrants for QR codes that might be missed
            const regions = [
                { x: 0, y: 0, w: 0.55, h: 0.55 },
                { x: 0.45, y: 0, w: 0.55, h: 0.55 },
                { x: 0, y: 0.45, w: 0.55, h: 0.55 },
                { x: 0.45, y: 0.45, w: 0.55, h: 0.55 },
                { x: 0.2, y: 0.2, w: 0.6, h: 0.6 },  // Center region
            ];
            
            for (const region of regions) {
                if (results.length >= maxQRCodes) break;
                
                const rx = Math.floor(region.x * width);
                const ry = Math.floor(region.y * height);
                const rw = Math.floor(region.w * width);
                const rh = Math.floor(region.h * height);
                
                procCtx.drawImage(video, rx, ry, rw, rh, 0, 0, rw, rh);
                const regionData = procCtx.getImageData(0, 0, rw, rh);
                
                // Try original
                let code = jsQR(regionData.data, rw, rh, {
                    inversionAttempts: 'attemptBoth'
                });
                
                // Try enhanced if original fails
                if (!code) {
                    enhanceImageData(regionData);
                    code = jsQR(regionData.data, rw, rh, {
                        inversionAttempts: 'attemptBoth'
                    });
                }
                
                if (code && code.data) {
                    const adjustedLocation = {
                        topLeftCorner: { x: code.location.topLeftCorner.x + rx, y: code.location.topLeftCorner.y + ry },
                        topRightCorner: { x: code.location.topRightCorner.x + rx, y: code.location.topRightCorner.y + ry },
                        bottomRightCorner: { x: code.location.bottomRightCorner.x + rx, y: code.location.bottomRightCorner.y + ry },
                        bottomLeftCorner: { x: code.location.bottomLeftCorner.x + rx, y: code.location.bottomLeftCorner.y + ry }
                    };
                    
                    const isNew = results.every(r => isNewLocation(r.location, adjustedLocation));
                    if (isNew) {
                        results.push({ data: code.data, location: adjustedLocation });
                    }
                }
            }
            
            return results;
        }

        function scanFrame() {
            if (!scanning) return;

            frameCount++;
            scanCounter++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fpsEl.textContent = frameCount;
                fpsEl.classList.toggle('zero', frameCount === 0);
                frameCount = 0;
                lastTime = now;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Always draw video for smooth display
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Only run QR detection every N frames for performance
                if (scanCounter >= SCAN_EVERY_N_FRAMES) {
                    scanCounter = 0;
                    
                    // Get image data for processing
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Detect multiple QR codes
                    const detectedCodes = detectMultipleQRCodes(imageData, canvas.width, canvas.height);
                    
                    // Update cache
                    if (detectedCodes.length > 0) {
                        cachedResults = detectedCodes;
                        cacheTimeout = 15;  // Keep results longer
                    } else if (cacheTimeout > 0) {
                        cacheTimeout--;
                    } else {
                        cachedResults = [];
                    }
                }
                
                const resultsToShow = cachedResults;
                
                // Process and draw detected QR codes (always draw from cache)
                const currentFrameQRs = [];
                
                resultsToShow.forEach((result, index) => {
                    processQRCode(result, index + 1);
                    currentFrameQRs.push({
                        data: result.data,
                        location: result.location,
                        index: index + 1
                    });
                    drawQROverlay(result, index + 1);
                });

                activeQRs = currentFrameQRs;
                
                // Update count display - show actual number of QR codes detected
                const count = currentFrameQRs.length;
                qrCountEl.textContent = count;
                qrCountEl.classList.toggle('zero', count === 0);

                // Update list active states (only every few frames to reduce DOM updates)
                if (scanCounter === 0) {
                    document.querySelectorAll('.qr-item').forEach(item => {
                        const qrData = item.dataset.qrData;
                        // Check if this QR code is currently visible in camera
                        const isActive = activeQRs.some(qr => qr.data === qrData);
                        item.classList.toggle('active', isActive);
                    });
                }
            }

            requestAnimationFrame(scanFrame);
        }

        function processQRCode(result, index) {
            const data = result.data;
            const timestamp = new Date().toLocaleTimeString();
            
            // Only add if this QR code DATA hasn't been scanned before (no duplicates by content)
            if (!detectedQRs.has(data)) {
                totalScanned++;
                totalScannedEl.textContent = totalScanned;
                totalScannedEl.classList.remove('zero');
                
                detectedQRs.set(data, { data, timestamp, index: totalScanned });
                
                updateQRList();
                showToast(`QR code #${totalScanned} detected!`);
            }
            // Note: The overlay will still be drawn for all visible QR codes
            // regardless of whether they've been scanned before
        }

        function drawQROverlay(result, index) {
            const loc = result.location;
            
            // Colors for different QR codes
            const colors = [
                { fill: 'rgba(0, 255, 180, 0.25)', stroke: '#00ffb4', corner: '#00c8ff' },
                { fill: 'rgba(255, 180, 0, 0.25)', stroke: '#ffb400', corner: '#ff8800' },
                { fill: 'rgba(180, 0, 255, 0.25)', stroke: '#b400ff', corner: '#8800ff' },
                { fill: 'rgba(0, 180, 255, 0.25)', stroke: '#00b4ff', corner: '#0088ff' },
                { fill: 'rgba(255, 0, 180, 0.25)', stroke: '#ff00b4', corner: '#ff0088' },
            ];
            const color = colors[(index - 1) % colors.length];
            
            // Draw filled polygon
            ctx.fillStyle = color.fill;
            ctx.beginPath();
            ctx.moveTo(loc.topLeftCorner.x, loc.topLeftCorner.y);
            ctx.lineTo(loc.topRightCorner.x, loc.topRightCorner.y);
            ctx.lineTo(loc.bottomRightCorner.x, loc.bottomRightCorner.y);
            ctx.lineTo(loc.bottomLeftCorner.x, loc.bottomLeftCorner.y);
            ctx.closePath();
            ctx.fill();

            // Draw border
            ctx.strokeStyle = color.stroke;
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw corners
            const corners = [loc.topLeftCorner, loc.topRightCorner, loc.bottomRightCorner, loc.bottomLeftCorner];
            corners.forEach(corner => {
                ctx.fillStyle = color.corner;
                ctx.beginPath();
                ctx.arc(corner.x, corner.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Draw label
            const labelX = Math.min(loc.topLeftCorner.x, loc.bottomLeftCorner.x);
            const labelY = Math.min(loc.topLeftCorner.y, loc.topRightCorner.y) - 10;
            
            ctx.fillStyle = color.stroke;
            ctx.fillRect(labelX, labelY - 30, 90, 35);
            ctx.fillStyle = '#000';
            ctx.font = 'bold 18px JetBrains Mono, monospace';
            ctx.fillText(`QR #${index}`, labelX + 10, labelY - 5);
        }

        function updateQRList() {
            if (detectedQRs.size === 0) {
                qrListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <div class="empty-text">
                            Point your camera at QR codes<br>
                            They will appear here
                        </div>
                    </div>
                `;
                return;
            }

            qrListEl.innerHTML = '';
            const qrArray = Array.from(detectedQRs.values()).reverse();
            
            qrArray.forEach((qr, i) => {
                const item = document.createElement('div');
                // Check if currently visible
                const isActive = activeQRs.some(aqr => aqr.data === qr.data);
                item.className = 'qr-item' + (isActive ? ' active' : '');
                item.dataset.qrData = qr.data;
                
                item.innerHTML = `
                    <div class="qr-header">
                        <span class="qr-badge">QR #${qr.index}</span>
                        <span class="qr-time">${qr.timestamp}</span>
                    </div>
                    <div class="qr-data">${escapeHtml(qr.data)}</div>
                    <div class="qr-actions">
                        <button class="btn btn-primary" onclick="copyToClipboard('${escapeForAttr(qr.data)}')">Copy</button>
                        ${isURL(qr.data) ? `<button class="btn btn-secondary" onclick="openURL('${escapeForAttr(qr.data)}')">Open Link</button>` : ''}
                    </div>
                `;
                
                qrListEl.appendChild(item);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeForAttr(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function isURL(text) {
            try {
                new URL(text);
                return true;
            } catch {
                return text.startsWith('http://') || text.startsWith('https://');
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied to clipboard!');
            }).catch(() => {
                showToast('Failed to copy');
            });
        }

        function openURL(url) {
            window.open(url, '_blank');
        }

        startBtn.addEventListener('click', startCamera);
    </script>
</body>
</html>
